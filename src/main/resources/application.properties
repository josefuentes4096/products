spring.application.name=products

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/products}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 'update' solo para desarrollo local. En produccion usar 'validate' o 'none'
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
# Deshabilitar en produccion para evitar verbosidad y filtracion de estructura de BD
spring.jpa.show-sql=${SHOW_SQL:false}
# Necesario para que data.sql se ejecute despues de que Hibernate cree el schema
spring.jpa.defer-datasource-initialization=true

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4173}