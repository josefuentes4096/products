spring.application.name=products

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/products}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Tolera arranques en frio del endpoint de Neon
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=validate
# Deshabilitar en produccion para evitar verbosidad y filtracion de estructura de BD
spring.jpa.show-sql=${SHOW_SQL:false}

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:4173}

# Render inyecta PORT; usa 8080 en local
server.port=${PORT:8080}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
