services:
  - type: web
    name: products-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: server
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SHOW_SQL
        value: "false"
